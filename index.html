<style>
  :root {
    --bg: #08080c;
    --surface: #101018;
    --surface-2: #16161f;
    --line: #23232e;
    --line-2: #2d2d3a;
    --ink: #f5f5f8;
    --ink-dim: #a0a0ae;
    --ink-faint: #64646f;
    --accent: #7c6cff;
    --accent-glow: #7c6cff44;
    --hard: #c6ff3d;
    --hard-ink: #0a0a0f;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  ::selection { background: var(--accent); color: #fff; }
  body {
    background:
      radial-gradient(900px 420px at 82% -8%, #2a1f6b33, transparent 60%),
      radial-gradient(700px 360px at 8% -4%, #123a5533, transparent 55%),
      var(--bg);
    background-attachment: fixed;
    color: var(--ink); font-family: var(--sans); font-size: 15px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  /* dark scrollbars everywhere */
  * { scrollbar-width: thin; scrollbar-color: var(--line-2) transparent; }
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 6px; border: 2px solid var(--bg); }
  *::-webkit-scrollbar-thumb:hover { background: #3b3b4c; }

  /* ---- Nav ---- */
  .nav {
    position: sticky; top: 0; z-index: 30;
    backdrop-filter: blur(14px); background: #08080ccc;
    border-bottom: 1px solid var(--line);
  }
  .nav .inner { max-width: 1160px; margin: 0 auto; padding: 16px 28px; display: flex; align-items: center; gap: 18px; }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 19px; letter-spacing: -0.02em; }
  .logo .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 16px var(--accent); }
  .logo b { color: var(--accent); font-weight: 800; }
  .tag { font-size: 12px; color: var(--ink-faint); border-left: 1px solid var(--line-2); padding-left: 14px; }
  .live { margin-left: auto; display: flex; align-items: center; gap: 9px; font-family: var(--mono); font-size: 12px; color: var(--ink-dim); }
  .live .n { color: var(--ink); font-weight: 700; font-variant-numeric: tabular-nums; }
  .live .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--hard); box-shadow: 0 0 10px var(--hard); animation: blink 2s infinite; }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

  /* ---- Hero strip ---- */
  .hero { max-width: 1160px; margin: 0 auto; padding: 40px 28px 20px; }
  .hero h1 { font-size: 40px; line-height: 1.02; font-weight: 850; letter-spacing: -0.03em; margin: 0 0 10px; max-width: 16ch; }
  .hero h1 .hl { color: var(--accent); }
  .hero p { color: var(--ink-dim); font-size: 16px; margin: 0; max-width: 52ch; }

  /* ---- Controls ---- */
  .controls { max-width: 1160px; margin: 0 auto; padding: 22px 28px 10px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; position: sticky; top: 65px; z-index: 20; }
  .seg { display: inline-flex; gap: 4px; padding: 4px; background: var(--surface); border: 1px solid var(--line); border-radius: 12px; }
  .seg button {
    font-family: var(--sans); font-size: 13px; font-weight: 600; padding: 7px 16px; border: none;
    background: none; color: var(--ink-dim); cursor: pointer; border-radius: 8px; transition: all .14s;
  }
  .seg button:hover { color: var(--ink); }
  .seg button.on { background: var(--accent); color: #fff; box-shadow: 0 4px 16px var(--accent-glow); }
  .seg button[data-type="hard"].on { background: var(--hard); color: var(--hard-ink); box-shadow: 0 4px 16px #c6ff3d44; }
  select {
    font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--ink); background: var(--surface);
    border: 1px solid var(--line); border-radius: 10px; padding: 9px 13px; cursor: pointer;
  }
  select:hover { border-color: var(--line-2); }
  .area { font-weight: 700; color: var(--ink); background: var(--surface-2); border-color: var(--line-2); padding-right: 30px; }
  .area:hover, .area:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); outline: none; }
  .search { display: flex; align-items: center; gap: 9px; margin-left: auto; background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 9px 14px; min-width: 240px; }
  .search:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .search svg { flex: none; }
  .search input { border: none; background: none; outline: none; color: var(--ink); font-family: var(--sans); font-size: 14px; width: 100%; }
  .search input::placeholder { color: var(--ink-faint); }

  /* ---- Feed grid ---- */
  .feed { max-width: 1160px; margin: 0 auto; padding: 14px 28px 90px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .item {
    display: flex; flex-direction: column; text-decoration: none; color: inherit;
    background: var(--surface); border: 1px solid var(--line); border-radius: 16px; padding: 20px;
    transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease; position: relative; overflow: hidden;
  }
  .item::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); opacity: 0; transition: opacity .16s; }
  .item.hard::before { background: var(--hard); }
  .item:hover { transform: translateY(-3px); border-color: var(--line-2); box-shadow: 0 12px 40px #00000066; }
  .item:hover::before { opacity: 1; }
  .head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .who { font-size: 17px; font-weight: 750; letter-spacing: -0.01em; line-height: 1.25; }
  .firm { display: block; font-size: 13px; font-weight: 500; color: var(--ink-faint); margin-top: 2px; }
  .badge { flex: none; font-size: 10px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; padding: 4px 10px; border-radius: 999px; }
  .badge.hard { background: var(--hard); color: var(--hard-ink); }
  .badge.soft { background: var(--surface-2); color: var(--ink-dim); border: 1px solid var(--line-2); }
  .excerpt { font-size: 14.5px; line-height: 1.5; color: var(--ink-dim); margin: 13px 0 0; flex: 1; }
  .foot { display: flex; align-items: center; gap: 10px; margin-top: 16px; font-size: 12px; color: var(--ink-faint); font-family: var(--mono); }
  .theme { font-family: var(--sans); font-size: 11px; font-weight: 600; letter-spacing: .02em; padding: 3px 10px; border: 1px solid var(--line-2); border-radius: 999px; color: var(--accent); background: #7c6cff10; }
  .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--ink-faint); }
  .conf-high { color: var(--hard); }
  .via { margin-left: auto; color: var(--ink-faint); font-weight: 600; }
  .item:hover .via { color: var(--accent); }
  .via::after { content: " \2197"; }

  /* ---- States ---- */
  .skel { background: var(--surface); border: 1px solid var(--line); border-radius: 16px; padding: 20px; }
  .sk { height: 14px; border-radius: 5px; background: linear-gradient(90deg,#16161f 25%,#22222e 50%,#16161f 75%); background-size: 200% 100%; animation: sh 1.4s infinite; margin-bottom: 11px; }
  @keyframes sh { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .state { grid-column: 1 / -1; padding: 80px 24px; text-align: center; color: var(--ink-faint); }
  .state .big { font-size: 22px; font-weight: 750; color: var(--ink); margin-bottom: 8px; }
  .state.err .big { color: #ff5470; }
  .state code { font-family: var(--mono); font-size: 13px; background: var(--surface); border: 1px solid var(--line); padding: 2px 7px; border-radius: 6px; color: var(--ink); }

  @media (max-width: 760px) {
    .feed { grid-template-columns: 1fr; }
    .hero h1 { font-size: 30px; }
    .controls { position: static; }
    .search { margin-left: 0; width: 100%; }
  }
</style>

<body>
<div class="nav">
  <div class="inner">
    <div class="logo"><span class="dot"></span>Fund<b>Vision</b></div>
    <span class="tag">your area</span>
    <select id="areaSel" class="area" aria-label="Choose your area"></select>
    <div class="live"><span class="live-dot"></span><span class="n" id="shown">0</span>&nbsp;tracked</div>
  </div>
</div>

<div class="hero">
  <h1>See who's <span class="hl">funding, hiring, and moving</span> in <span id="areaWord">cyber</span>.</h1>
  <p>Every hard signal and hot take from the VCs and voices shaping your space. Refreshed hourly, straight from the source.</p>
</div>

<div class="controls">
  <div class="seg" id="typeSeg">
    <button data-type="all" class="on">All</button>
    <button data-type="hard">Hard</button>
    <button data-type="soft">Soft</button>
  </div>
  <select id="firmSel"><option value="">All firms</option></select>
  <select id="themeSel"><option value="">All themes</option></select>
  <label class="search">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#64646f" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="q" type="search" placeholder="search a person, firm, phrase…" autocomplete="off">
  </label>
</div>

<div class="feed" id="feed"></div>

<script>
const state = { all: [], vertical: "cyber", verticals: [], type: "all", firm: "", theme: "", q: "" };
const el = id => document.getElementById(id);
const esc = s => (s||"").replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const prettyCat = c => (c||"").replace(/_/g, " ");

function relTime(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr);
  if (isNaN(d)) return esc(dateStr);
  const days = Math.floor((Date.now() - d.getTime()) / 86400000);
  if (days <= 0) return "today";
  if (days === 1) return "yesterday";
  if (days < 30) return days + "d ago";
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
}

function showSkeleton() {
  el("feed").innerHTML = Array.from({length: 6}).map(() =>
    `<div class="skel"><div class="sk" style="width:55%"></div>
     <div class="sk" style="width:90%"></div><div class="sk" style="width:70%"></div>
     <div class="sk" style="width:35%"></div></div>`).join("");
}

function buildControls() {
  const firms = [...new Set(state.all.map(x => x.firm).filter(Boolean))].sort((a,b) => a.localeCompare(b));
  el("firmSel").innerHTML = `<option value="">All firms</option>` +
    firms.map(f => `<option value="${esc(f)}">${esc(f)}</option>`).join("");

  const themeCount = {};
  state.all.forEach(x => { if (x.signal_category) themeCount[x.signal_category] = (themeCount[x.signal_category]||0)+1; });
  const themes = Object.keys(themeCount).sort((a,b) => themeCount[b]-themeCount[a]);
  el("themeSel").innerHTML = `<option value="">All themes</option>` +
    themes.map(t => `<option value="${esc(t)}">${esc(prettyCat(t))} (${themeCount[t]})</option>`).join("");

  el("typeSeg").querySelectorAll("button").forEach(b => b.onclick = () => {
    state.type = b.dataset.type;
    el("typeSeg").querySelectorAll("button").forEach(x => x.classList.toggle("on", x === b));
    render();
  });
  el("firmSel").onchange = e => { state.firm = e.target.value; render(); };
  el("themeSel").onchange = e => { state.theme = e.target.value; render(); };
}

function matches(x) {
  if (state.type !== "all" && x.signal_type !== state.type) return false;
  if (state.firm && x.firm !== state.firm) return false;
  if (state.theme && x.signal_category !== state.theme) return false;
  if (state.q) {
    const hay = [x.person_name, x.firm, x.summary, x.excerpt, x.signal_category].join(" ").toLowerCase();
    if (!hay.includes(state.q)) return false;
  }
  return true;
}

function itemHtml(x) {
  const type = x.signal_type === "hard" ? "hard" : "soft";
  const badge = type === "hard" ? "Hard" : "Soft";
  const conf = (x.confidence || "").toLowerCase();
  const confClass = conf === "high" ? "conf-high" : "";
  const body = x.excerpt || x.summary || "";
  const via = x.source_type ? esc(x.source_type) : "source";
  return `<a class="item ${type}" href="${esc(x.source_url||'#')}" target="_blank" rel="noopener">
    <div class="head">
      <div class="who">${esc(x.person_name || "Unknown")}${x.firm ? `<span class="firm">${esc(x.firm)}</span>` : ""}</div>
      <span class="badge ${type}">${badge}</span>
    </div>
    ${body ? `<p class="excerpt">${esc(body)}</p>` : ""}
    <div class="foot">
      ${x.signal_category ? `<span class="theme">${esc(prettyCat(x.signal_category))}</span>` : ""}
      <span>${relTime(x.source_date)}</span>
      ${conf ? `<span class="dot"></span><span class="${confClass}">${esc(conf)}</span>` : ""}
      <span class="via">${via}</span>
    </div>
  </a>`;
}

function render() {
  const list = state.all.filter(matches);
  list.sort((a,b) => (b.source_date||"").localeCompare(a.source_date||""));
  el("shown").textContent = list.length;
  if (!list.length) {
    el("feed").innerHTML = `<div class="state"><div class="big">Nothing matches yet</div>
      <div>Clear a filter or the search to see the whole room.</div></div>`;
    return;
  }
  el("feed").innerHTML = list.map(itemHtml).join("");
}

el("q").addEventListener("input", e => { state.q = e.target.value.trim().toLowerCase(); render(); });

function updateAreaWord() {
  const v = state.verticals.find(x => x.id === state.vertical);
  el("areaWord").textContent = v ? v.label.toLowerCase() : state.vertical;
}

async function loadVerticals() {
  try {
    const res = await fetch("verticals.json", { cache: "no-store" });
    if (!res.ok) throw new Error("no registry");
    const d = await res.json();
    state.verticals = (d.verticals || []).filter(v => v.id && v.label);
  } catch { state.verticals = [{ id: "cyber", label: "Cybersecurity" }]; }
  const saved = localStorage.getItem("fv_vertical");
  if (saved && state.verticals.some(v => v.id === saved)) state.vertical = saved;
  const sel = el("areaSel");
  sel.innerHTML = state.verticals.map(v => `<option value="${esc(v.id)}">${esc(v.label)}</option>`).join("");
  sel.value = state.vertical;
  updateAreaWord();
  sel.onchange = () => {
    state.vertical = sel.value;
    localStorage.setItem("fv_vertical", state.vertical);
    state.type = "all"; state.firm = ""; state.theme = ""; state.q = "";
    el("q").value = "";
    el("typeSeg").querySelectorAll("button").forEach(b => b.classList.toggle("on", b.dataset.type === "all"));
    updateAreaWord();
    load();
  };
}

async function load() {
  showSkeleton();
  try {
    const res = await fetch(`signals-${state.vertical}.json`, { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    state.all = Array.isArray(data) ? data : (data.signals || []);
    if (!state.all.length) {
      el("feed").innerHTML = `<div class="state"><div class="big">The room is quiet</div>
        <div>No signals for this area yet. Run <code>python scripts/live_monitor.py --vertical ${esc(state.vertical)}</code>.</div></div>`;
      return;
    }
    buildControls();
    render();
  } catch (err) {
    el("feed").innerHTML = `<div class="state err"><div class="big">Could not load the feed</div>
      <div>${esc(err.message)} — expected <code>signals-data.json</code> beside this page.</div></div>`;
  }
}
loadVerticals().then(load);
</script>
</body>
